# Tinfoil Container Configuration
# The image's @sha256:... is rewritten by tinfoil-release.yml on each tagged
# release — leave it alone. Edit env values + secrets here as needed.
#
# Full reference: https://docs.tinfoil.sh/containers/configuration

cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "sim"
    image: "ghcr.io/tinfoilsh/tinfoil-persistent-storage-example@sha256:f8d46cfaa25b5e103f5b6a44c657a8a4919abf730bf6e077255fd16179cf71f7" # v0.5.3
    env:
      - PORT: "8080"
    # To resume an existing run, set:
    #   command: ["--resume-from", "2026-05-06T04-43-46Z:2"]

  - name: "buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets-2@sha256:62751a0ab6d2b54689fc6c7e2893979880fdf4e089710938ac8b19fe40367455" # v0.0.1
    env:
      - PORT: "9000"
      - BUCKET: "tinfoil-bucket-273354634536-us-east-2-an"
      - AWS_REGION: "us-east-2"
    secrets:
      - ENCRYPTION_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /status
