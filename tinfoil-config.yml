# Tinfoil Container Configuration
# The image's @sha256:... is rewritten by tinfoil-release.yml on each tagged
# release — leave it alone. Edit env values + secrets here as needed.
#
# Full reference: https://docs.tinfoil.sh/containers/configuration

cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "sim"
    image: "ghcr.io/tinfoilsh/tinfoil-persistent-storage-example@sha256:f4d38452ab97d1c007c61ddd78b6eaeedad24b8d26468274fd841c914f011f5f" # v0.5.4
    env:
      - PORT: "8080"
    # To resume an existing run, set:
    #   command: ["--resume-from", "2026-05-06T04-43-46Z:2"]

  - name: "buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets-2@sha256:9c445c8e848f6d7d24fdc83f4638452ad5f8d0386323266e59f42594a2104641" # v0.0.2
    env:
      - PORT: "9000"
      - BUCKET: "tinfoil-bucket-273354634536-us-east-2-an"
      - AWS_REGION: "us-east-2"
    secrets:
      - ENCRYPTION_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /status
