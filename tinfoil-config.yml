# Tinfoil Container Configuration
# After creating a repo from this template, replace OWNER/REPO below with your
# GitHub path (e.g. ghcr.io/tinfoilsh/my-app). The build workflow rewrites the
# digest on every tagged release — you don't need to touch the @sha256 part.
#
# Full reference: https://docs.tinfoil.sh/containers/configuration

cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "sim"
    image: "ghcr.io/OWNER/REPO:placeholder"
    env:
      - PORT: "8080"
      - AWS_REGION: "us-east-1"
      - S3_BUCKET: "REPLACE-WITH-YOUR-BUCKET"
    # To resume an existing run, set:
    #   command: ["--resume-from", "2026-05-06T04-43-46Z:2"]
    secrets:
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /status
