# Tinfoil Container Configuration
# The image's @sha256:... is rewritten by tinfoil-release.yml on each tagged
# release — leave it alone. Edit env values + secrets here as needed.
#
# Full reference: https://docs.tinfoil.sh/containers/configuration

cvm-version: 0.7.5
cpus: 2
memory: 8192

containers:
  - name: "sim"
    image: "ghcr.io/tinfoilsh/tinfoil-persistent-storage-example@sha256:eedb5815c13f1b21bd2a06810ca7f3c5e81881b57f009a4c8fc2db48e863df3e" # v0.5.5
    env:
      - PORT: "8080"
    # To resume an existing run, set:
    #   command: ["--resume-from", "2026-05-06T04-43-46Z:2"]

  - name: "buckets"
    image: "ghcr.io/tinfoilsh/tinfoil-buckets-sidecar@sha256:7fd00873d80e9e597373d05ca896370e6b7ce26f168bc2f904618fa395559aff" # v0.0.3
    env:
      - PORT: "9000"
      - BUCKET: "tinfoil-bucket-273354634536-us-east-2-an"
      - AWS_REGION: "us-east-2"
    secrets:
      - ENCRYPTION_KEY
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY

shim:
  upstream-port: 8080
  paths:
    - /health
    - /status
